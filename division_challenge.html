<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生活中的除法「平分」大挑戰</title>
    <style>
        :root {
            --wood-color: #5d4037;
            --plate-blue: #0d47a1;
            --plate-gold: #ffd700;
            --bg-gradient: linear-gradient(135deg, #2c3e50 0%, #000000 100%);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Microsoft JhengHei', sans-serif;
            background: #3e2723; /* 木桌底色 */
            background-image: url('https://www.transparenttextures.com/patterns/wood-pattern.png');
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: white;
            overflow-x: hidden;
        }

        .header {
            text-align: center;
            padding: 20px;
            background: rgba(0, 0, 0, 0.5);
            width: 100%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }

        h1 {
            margin: 0;
            font-size: clamp(24px, 5vw, 36px);
            color: var(--plate-gold);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .game-container {
            position: relative;
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            padding: 20px;
        }

        /* 大型陶瓷中央盤子 */
        .main-plate-container {
            position: relative;
            width: clamp(300px, 80vw, 500px);
            height: clamp(300px, 80vw, 500px);
            background: var(--plate-blue);
            border-radius: 50%;
            border: 15px solid #fff; /* 陶瓷邊緣 */
            box-shadow: 
                inset 0 0 50px rgba(0,0,0,0.5),
                0 15px 35px rgba(0,0,0,0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: visible;
        }

        .main-plate-design {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-image: 
                radial-gradient(circle at center, #ff8f00 0%, transparent 30%),
                radial-gradient(circle at 30% 20%, rgba(255,255,255,0.1) 0%, transparent 20%);
            border: 2px solid var(--plate-gold);
        }

        /* 太陽 */
        .sun {
            position: absolute;
            width: 80px;
            height: 80px;
            background: radial-gradient(circle, #ffeb3b, #f57f17);
            border-radius: 50%;
            box-shadow: 0 0 30px #ffeb3b;
            z-index: 2;
        }

        /* 星座分隔線 */
        .constellation-lines {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            opacity: 0.4;
        }

        /* 行星側盤 */
        .side-plates-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            width: 100%;
        }

        .side-plate {
            width: 120px;
            height: 120px;
            background: #f5f5f5;
            border-radius: 50%;
            border: 8px solid #ddd;
            box-shadow: 0 8px 15px rgba(0,0,0,0.3);
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-content: center;
            padding: 10px;
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
        }

        .side-plate.target-active {
            transform: scale(1.1);
            box-shadow: 0 0 20px var(--plate-gold);
            border-color: var(--plate-gold);
        }

        .side-plate::after {
            content: attr(data-label);
            position: absolute;
            bottom: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 2px black;
            white-space: nowrap;
        }

        /* 食物物件 */
        .food-item {
            width: 40px;
            height: 40px;
            font-size: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: grab;
            user-select: none;
            transition: transform 0.1s;
            z-index: 10;
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.3));
        }

        .food-item:active {
            cursor: grabbing;
            transform: scale(1.2);
        }

        .food-item.in-plate {
            position: absolute;
        }

        /* 遊戲資訊 */
        .info-panel {
            background: rgba(0,0,0,0.7);
            padding: 15px 30px;
            border-radius: 20px;
            border: 2px solid var(--plate-gold);
            text-align: center;
            font-size: 1.2em;
            margin-bottom: 10px;
        }

        .question-text {
            font-size: 1.5em;
            color: #fff;
            margin-bottom: 10px;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-top: 10px;
            font-size: 0.9em;
        }

        .control-btns {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .btn {
            padding: 10px 25px;
            border-radius: 25px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1em;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        .btn-check {
            background: linear-gradient(to bottom, #4caf50, #2e7d32);
            color: white;
        }

        .btn-next {
            background: linear-gradient(to bottom, #2196f3, #1565c0);
            color: white;
        }

        .btn-home {
            background: linear-gradient(to bottom, #9e9e9e, #616161);
            color: white;
        }

        .btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        .btn:active {
            transform: translateY(0);
        }

        /* 餘數區域 */
        .remainder-container {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            min-width: 200px;
            text-align: center;
        }

        .remainder-zone {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 5px;
            min-height: 50px;
            padding: 10px;
            border: 2px dashed rgba(255,255,255,0.3);
            border-radius: 10px;
            margin-top: 5px;
        }

        /* 效果 */
        @keyframes successPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .success-animation {
            animation: successPop 0.5s ease;
        }

        /* 響應式調整 */
        @media (max-width: 600px) {
            html, body { height: 100vh; }
            body { overflow-x: hidden; }
            .header { padding: 12px; margin-bottom: 10px; }
            h1 { font-size: clamp(18px, 5.2vw, 26px); }
            .info-panel { padding: 10px 14px; font-size: 0.95em; margin-bottom: 8px; }
            .question-text { font-size: 1.2em; }
            .stats { gap: 12px; font-size: 0.85em; }
            .game-container { gap: 16px; padding: 12px; }
            .main-plate-container { width: 320px; height: 320px; border-width: 10px; }
            .main-plate-design { border-width: 1px; }
            .constellation-lines { display: none; }
            .sun { width: 60px; height: 60px; }
            .side-plates-container { gap: 12px; }
            .side-plate { width: 90px; height: 90px; border-width: 6px; padding: 6px; }
            .side-plate::after { bottom: -20px; font-size: 12px; }
            .food-item { width: 28px; height: 28px; font-size: 21px; }
            .control-btns { gap: 10px; margin-top: 10px; }
            .btn { padding: 8px 16px; font-size: 0.95em; }
            .remainder-container { margin-top: 10px; padding: 10px; min-width: auto; }
            .remainder-zone { min-height: 40px; padding: 8px; gap: 4px; }
        }

        @media (max-width: 480px) {
            html, body { height: 100vh; }
            body { overflow: hidden; }
            .header { padding: 8px; margin-bottom: 6px; }
            h1 { font-size: clamp(16px, 5vw, 20px); }
            .info-panel { padding: 8px 10px; font-size: 0.9em; margin-bottom: 6px; }
            .question-text { font-size: 1.05em; }
            .stats { gap: 8px; font-size: 0.8em; }
            .game-container { gap: 10px; padding: 8px; }
            .main-plate-container { width: 260px; height: 260px; border-width: 8px; }
            .main-plate-design { border-width: 1px; }
            .sun { width: 48px; height: 48px; }
            .side-plates-container { gap: 10px; }
            .side-plate { width: 72px; height: 72px; border-width: 5px; padding: 4px; }
            .side-plate::after { bottom: -16px; font-size: 11px; }
            .food-item { width: 24px; height: 24px; font-size: 18px; }
            .control-btns { gap: 8px; margin-top: 6px; }
            .btn { padding: 6px 12px; font-size: 0.85em; }
            .remainder-container { margin-top: 6px; padding: 8px; min-width: auto; }
            .remainder-zone { min-height: 34px; padding: 6px; gap: 3px; }
        }

        /* 平板橫向（Landscape）優化：縮小元件避免版面過大 */
        @media (min-width: 768px) and (max-width: 1100px) and (orientation: landscape) {
            body { overflow-x: hidden; }
            .header { padding: 14px; margin-bottom: 12px; }
            h1 { font-size: clamp(22px, 3.6vw, 30px); }
            .info-panel { padding: 12px 18px; font-size: 1em; margin-bottom: 10px; }
            .question-text { font-size: 1.25em; }
            .game-container { gap: 24px; padding: 16px; }

            /* 主盤略縮，仍保有視覺重心 */
            .main-plate-container { width: 380px; height: 380px; border-width: 12px; }
            .main-plate-design { border-width: 2px; }
            .sun { width: 68px; height: 68px; }

            /* 側盤與食物略縮，保有清晰度 */
            .side-plates-container { gap: 16px; }
            .side-plate { width: 104px; height: 104px; border-width: 7px; padding: 8px; }
            .side-plate::after { bottom: -22px; font-size: 13px; }
            .food-item { width: 32px; height: 32px; font-size: 24px; }

            /* 控制區塊微調 */
            .control-btns { gap: 12px; margin-top: 12px; }
            .btn { padding: 9px 18px; font-size: 0.95em; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🌌 生活中的除法：平分大挑戰 🌌</h1>
    </div>

    <div class="info-panel">
        <div id="questionText" class="question-text">準備好了嗎？</div>
        <div id="instructionText">將物品平均分配到下方的小盤子中</div>
        <div class="stats">
            <span>得分: <b id="score">0</b></span>
            <span>關卡: <b id="level">1</b></span>
        </div>
    </div>

    <div class="game-container">
        <!-- 中央主盤 -->
        <div id="mainPlate" class="main-plate-container">
            <div class="main-plate-design"></div>
            <div class="sun"></div>
            <svg class="constellation-lines" viewBox="0 0 500 500">
                <circle cx="250" cy="250" r="100" fill="none" stroke="gold" stroke-width="1" stroke-dasharray="5,5" />
                <circle cx="250" cy="250" r="180" fill="none" stroke="gold" stroke-width="1" stroke-dasharray="5,5" />
                <line x1="250" y1="50" x2="250" y2="450" stroke="gold" stroke-width="0.5" />
                <line x1="50" y1="250" x2="450" y2="250" stroke="gold" stroke-width="0.5" />
            </svg>
            <!-- 食物會生成在這裡 -->
        </div>

        <!-- 側盤區域 -->
        <div id="sidePlatesContainer" class="side-plates-container">
            <!-- 側盤會動態生成 -->
        </div>

        <!-- 餘數區域 -->
        <div class="remainder-container">
            <div>剩下的（餘數）放這裡：</div>
            <div id="remainderZone" class="remainder-zone"></div>
        </div>

        <div class="control-btns">
            <button class="btn btn-home" onclick="location.href='index.html'">返回地圖</button>
            <button id="checkBtn" class="btn btn-check" onclick="game.checkAnswer()">檢查答案</button>
            <button id="nextBtn" class="btn btn-next" onclick="game.nextQuestion()" style="display: none;">下一題</button>
        </div>
    </div>

    <script>
        const AudioSystem = {
            context: null,
            init() {
                if (this.context) return;
                this.context = new (window.AudioContext || window.webkitAudioContext)();
            },
            play(freq, type = 'sine', duration = 0.3, volume = 0.2) {
                try {
                    this.init();
                    if (this.context.state === 'suspended') this.context.resume();
                    const osc = this.context.createOscillator();
                    const gain = this.context.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, this.context.currentTime);
                    gain.gain.setValueAtTime(volume, this.context.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, this.context.currentTime + duration);
                    osc.connect(gain);
                    gain.connect(this.context.destination);
                    osc.start();
                    osc.stop(this.context.currentTime + duration);
                } catch(e) {}
            },
            playCorrect() {
                this.play(523.25, 'sine', 0.1);
                setTimeout(() => this.play(659.25, 'sine', 0.1), 100);
                setTimeout(() => this.play(783.99, 'sine', 0.2), 200);
            },
            playWrong() {
                this.play(200, 'sawtooth', 0.3, 0.1);
            },
            playPop() {
                this.play(800, 'sine', 0.05, 0.1);
            }
        };

        const game = {
            score: 0,
            level: 1,
            currentTotal: 0,
            currentDivisor: 0,
            foodType: '🍎',
            foodItems: [],
            plates: [],
            
            foods: ['🍎', '🍕', '🍪', '🍩', '🍬', '🍓', '🧁', '🍒', '🥨', '🥞'],
            plateNames: ['水星盤', '金星盤', '火星盤', '木星盤', '土星盤'],

            init() {
                this.nextQuestion();
                this.setupDragAndDrop();
            },

            nextQuestion() {
                // 生成新題目
                this.currentDivisor = Math.floor(Math.random() * 3) + 2; // 2-4 個盤子 (增加 5 盤的可能性可以隨等級增加)
                if (this.level > 3) this.currentDivisor = Math.floor(Math.random() * 4) + 2; // 2-5
                
                const maxMultiplier = this.level > 5 ? 8 : 5;
                const quotient = Math.floor(Math.random() * maxMultiplier) + 1;
                const remainder = Math.random() > 0.6 ? Math.floor(Math.random() * this.currentDivisor) : 0;
                
                this.currentTotal = (quotient * this.currentDivisor) + remainder;
                this.foodType = this.foods[Math.floor(Math.random() * this.foods.length)];
                
                // 更新 UI
                document.getElementById('questionText').innerText = `${this.currentTotal} 個 ${this.foodType}，平分給 ${this.currentDivisor} 個盤子`;
                document.getElementById('instructionText').innerText = `每個盤子要放幾個呢？剩下的放餘數區。`;
                document.getElementById('score').innerText = this.score;
                document.getElementById('level').innerText = this.level;
                document.getElementById('nextBtn').style.display = 'none';
                document.getElementById('checkBtn').style.display = 'block';
                
                this.renderPlates();
                this.renderFood();
            },

            renderPlates() {
                const container = document.getElementById('sidePlatesContainer');
                container.innerHTML = '';
                this.plates = [];
                
                for (let i = 0; i < this.currentDivisor; i++) {
                    const plate = document.createElement('div');
                    plate.className = 'side-plate';
                    plate.id = `plate-${i}`;
                    plate.dataset.label = this.plateNames[i];
                    container.appendChild(plate);
                    this.plates.push(plate);
                }
                
                // 清空餘數區
                document.getElementById('remainderZone').innerHTML = '';
            },

            renderFood() {
                const container = document.getElementById('mainPlate');
                // 移除舊的食物
                const oldFoods = container.querySelectorAll('.food-item');
                oldFoods.forEach(f => f.remove());
                
                const rect = container.getBoundingClientRect();
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                const plateRadius = rect.width / 2;
                
                for (let i = 0; i < this.currentTotal; i++) {
                    const food = document.createElement('div');
                    food.className = 'food-item in-plate';
                    food.innerText = this.foodType;
                    food.draggable = true;
                    food.id = `food-${i}`;
                    
                    // 隨機分佈在主盤圓周內，避開太陽
                    const angle = Math.random() * Math.PI * 2;
                    // 在 20% 到 85% 半徑之間分佈，避免太靠近邊緣或太陽
                    const dist = (plateRadius * 0.2) + Math.random() * (plateRadius * 0.6); 
                    
                    food.style.left = `${centerX + Math.cos(angle) * dist - 20}px`;
                    food.style.top = `${centerY + Math.sin(angle) * dist - 20}px`;
                    
                    container.appendChild(food);
                }
            },

            setupDragAndDrop() {
                let draggedItem = null;

                document.addEventListener('dragstart', (e) => {
                    if (e.target.classList.contains('food-item')) {
                        draggedItem = e.target;
                        e.target.style.opacity = '0.5';
                        AudioSystem.playPop();
                    }
                });

                document.addEventListener('dragend', (e) => {
                    if (e.target.classList.contains('food-item')) {
                        e.target.style.opacity = '1';
                    }
                });

                document.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    const target = e.target.closest('.side-plate, #remainderZone, #mainPlate');
                    if (target) {
                        // 視覺回饋
                    }
                });

                document.addEventListener('drop', (e) => {
                    e.preventDefault();
                    const target = e.target.closest('.side-plate, #remainderZone, #mainPlate');
                    
                    if (draggedItem && target) {
                        if (target.id === 'mainPlate') {
                            // 回到主盤，需要計算相對位置
                            const rect = target.getBoundingClientRect();
                            draggedItem.className = 'food-item in-plate';
                            draggedItem.style.left = (e.clientX - rect.left - 20) + 'px';
                            draggedItem.style.top = (e.clientY - rect.top - 20) + 'px';
                            target.appendChild(draggedItem);
                        } else {
                            // 移入側盤或餘數區
                            draggedItem.className = 'food-item';
                            draggedItem.style.position = 'static';
                            target.appendChild(draggedItem);
                        }
                        AudioSystem.playPop();
                    }
                });
                
                // 支援觸控
                document.addEventListener('touchstart', (e) => {
                    if (e.target.classList.contains('food-item')) {
                        const touch = e.touches[0];
                        draggedItem = e.target;
                        draggedItem._startX = touch.clientX;
                        draggedItem._startY = touch.clientY;
                        draggedItem._origLeft = draggedItem.offsetLeft;
                        draggedItem._origTop = draggedItem.offsetTop;
                        draggedItem.style.zIndex = 1000;
                        AudioSystem.playPop();
                    }
                }, {passive: false});

                document.addEventListener('touchmove', (e) => {
                    if (draggedItem) {
                        e.preventDefault();
                        const touch = e.touches[0];
                        const dx = touch.clientX - draggedItem._startX;
                        const dy = touch.clientY - draggedItem._startY;
                        
                        // 讓物件跟隨手指
                        draggedItem.style.position = 'fixed';
                        draggedItem.style.left = (touch.clientX - 20) + 'px';
                        draggedItem.style.top = (touch.clientY - 20) + 'px';
                    }
                }, {passive: false});

                document.addEventListener('touchend', (e) => {
                    if (draggedItem) {
                        const touch = e.changedTouches[0];
                        draggedItem.style.display = 'none'; // 暫時隱藏以獲取下方的元素
                        const dropTarget = document.elementFromPoint(touch.clientX, touch.clientY);
                        draggedItem.style.display = 'flex';
                        
                        const target = dropTarget ? dropTarget.closest('.side-plate, #remainderZone, #mainPlate') : null;
                        
                        if (target) {
                            if (target.id === 'mainPlate') {
                                const rect = target.getBoundingClientRect();
                                draggedItem.className = 'food-item in-plate';
                                draggedItem.style.position = 'absolute';
                                draggedItem.style.left = (touch.clientX - rect.left - 20) + 'px';
                                draggedItem.style.top = (touch.clientY - rect.top - 20) + 'px';
                                target.appendChild(draggedItem);
                            } else {
                                draggedItem.className = 'food-item';
                                draggedItem.style.position = 'static';
                                target.appendChild(draggedItem);
                            }
                        } else {
                            // 回到主盤原位 (如果掉在外面)
                            const mainPlate = document.getElementById('mainPlate');
                            const rect = mainPlate.getBoundingClientRect();
                            draggedItem.className = 'food-item in-plate';
                            draggedItem.style.position = 'absolute';
                            draggedItem.style.left = (rect.width / 2 - 20) + 'px';
                            draggedItem.style.top = (rect.height / 2 - 20) + 'px';
                            mainPlate.appendChild(draggedItem);
                        }
                        draggedItem.style.zIndex = 10;
                        draggedItem = null;
                        AudioSystem.playPop();
                    }
                });
            },

            checkAnswer() {
                const plateCounts = this.plates.map(p => p.querySelectorAll('.food-item').length);
                const remainderCount = document.getElementById('remainderZone').querySelectorAll('.food-item').length;
                const inMainPlate = document.getElementById('mainPlate').querySelectorAll('.food-item').length;
                
                if (inMainPlate > 0) {
                    alert('還有食物在主盤上喔！要把所有食物分完。');
                    return;
                }
                
                const firstCount = plateCounts[0];
                const allEqual = plateCounts.every(count => count === firstCount);
                
                const correctQuotient = Math.floor(this.currentTotal / this.currentDivisor);
                const correctRemainder = this.currentTotal % this.currentDivisor;
                
                if (allEqual && firstCount === correctQuotient && remainderCount === correctRemainder) {
                    AudioSystem.playCorrect();
                    this.score += 10;
                    this.level++;
                    document.getElementById('questionText').innerText = `太棒了！答對了！`;
                    document.getElementById('instructionText').innerText = `${this.currentTotal} ÷ ${this.currentDivisor} = ${correctQuotient} ... ${correctRemainder}`;
                    
                    document.getElementById('checkBtn').style.display = 'none';
                    document.getElementById('nextBtn').style.display = 'block';
                    
                    // 加分動畫
                    document.querySelector('.info-panel').classList.add('success-animation');
                    setTimeout(() => document.querySelector('.info-panel').classList.remove('success-animation'), 500);
                } else {
                    AudioSystem.playWrong();
                    if (!allEqual) {
                        alert('小盤子裡的食物數量要一樣多喔！（這才叫平分）');
                    } else {
                        alert('數量不太對喔，再數看看！');
                    }
                }
            }
        };

        window.onload = () => game.init();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>九九乘法「秒答」大挑戰 - 對戰卡牌版</title>
    <style>
        :root {
            --space-bg: #050510;
            --electric-blue: #00f2ff;
            --electric-orange: #ff8c00;
            --neon-glow: 0 0 15px rgba(0, 242, 255, 0.8), 0 0 30px rgba(0, 242, 255, 0.4);
            --orange-glow: 0 0 15px rgba(255, 140, 0, 0.8), 0 0 30px rgba(255, 140, 0, 0.4);
            --card-border: #fff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--space-bg);
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 1px, transparent 20px),
                radial-gradient(white, rgba(255,255,255,.1) 1px, transparent 40px);
            background-size: 200px 200px, 300px 300px;
            font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 像素星塵 */
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0.5;
            animation: move-star linear infinite;
        }

        @keyframes move-star {
            from { transform: translateY(0); }
            to { transform: translateY(100vh); }
        }

        .header {
            margin-top: 20px;
            text-align: center;
            z-index: 10;
        }

        h1 {
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            color: var(--electric-blue);
            text-shadow: var(--neon-glow);
            margin: 5px 0;
        }

        .stats-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 10px;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 15px;
            border-radius: 20px;
            border: 1px solid var(--electric-blue);
            font-size: 0.9rem;
        }

        /* 遊戲區域 */
        .game-world {
            position: relative;
            flex-grow: 1;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
        }

        /* 卡牌設計 */
        .card-container {
            width: 240px;
            height: 340px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .card-container.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 18px;
            border: 6px solid var(--card-border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 卡牌背面 - 火彗星設計 */
        .card-back {
            background: linear-gradient(135deg, #111 0%, #222 100%);
            border-color: var(--electric-blue);
            box-shadow: var(--neon-glow);
            justify-content: center;
            align-items: center;
        }

        .comet-art {
            position: relative;
            width: 120px;
            height: 120px;
        }

        .comet-body {
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 30%, #ffeb3b, #ff8c00 40%, #ff4500 70%);
            border-radius: 50% 50% 50% 10%;
            transform: rotate(-45deg);
            border: 3px solid white;
            box-shadow: var(--orange-glow);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* 酷炫表情 */
        .comet-face {
            transform: rotate(45deg);
            width: 60px;
            height: 30px;
            position: relative;
        }
        .comet-eye {
            position: absolute;
            width: 15px;
            height: 15px;
            background: black;
            border-radius: 50%;
            top: 0;
        }
        .eye-left { left: 5px; }
        .eye-right { right: 5px; }
        .comet-eye::after {
            content: '';
            position: absolute;
            width: 5px;
            height: 5px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
        }
        .comet-mouth {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 10px;
            border-bottom: 4px solid black;
            border-radius: 0 0 15px 15px;
        }

        .floating-numbers {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        .fn {
            position: absolute;
            font-size: 28px;
            font-weight: 900;
            color: var(--electric-blue);
            text-shadow: 0 0 10px white;
            animation: float-num 2s infinite ease-in-out alternate;
        }
        .fn-2 { top: 15%; left: 15%; animation-delay: 0s; }
        .fn-3 { top: 15%; right: 15%; animation-delay: 0.5s; }
        .fn-5 { bottom: 15%; left: 15%; animation-delay: 1s; }
        .fn-8 { bottom: 15%; right: 15%; animation-delay: 1.5s; }

        @keyframes float-num {
            from { transform: translateY(0) scale(0.9); opacity: 0.6; }
            to { transform: translateY(-10px) scale(1.1); opacity: 1; }
        }

        /* 卡牌正面 - 算式 */
        .card-front {
            background: white;
            color: #1a1a3a;
            transform: rotateY(180deg);
            justify-content: space-around;
            align-items: center;
            padding: 20px;
        }

        .formula {
            font-size: 4rem;
            font-weight: 900;
            margin: 0;
        }

        .answer-input {
            width: 80%;
            font-size: 2.5rem;
            text-align: center;
            border: 4px solid var(--electric-blue);
            border-radius: 12px;
            padding: 10px;
            outline: none;
            background: #f0f0f0;
            color: #111;
        }

        /* 收集區域 (手牌) */
        .collection-deck {
            position: absolute;
            bottom: -50px;
            width: 100%;
            height: 150px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding-bottom: 20px;
            background: linear-gradient(to top, rgba(0, 242, 255, 0.2), transparent);
            border-top: 1px solid rgba(0, 242, 255, 0.3);
        }

        .collected-card {
            width: 60px;
            height: 90px;
            background: var(--electric-blue);
            border: 2px solid white;
            border-radius: 5px;
            margin: 0 -15px;
            box-shadow: 0 -5px 10px rgba(0,0,0,0.5);
            transform-origin: bottom center;
            transition: transform 0.3s;
        }

        .collected-card:hover {
            transform: translateY(-20px) scale(1.2);
            z-index: 100;
        }

        /* 動畫 */
        .fly-to-deck {
            animation: fly-to-deck-anim 0.6s forwards cubic-bezier(0.5, -0.5, 1, 1);
            pointer-events: none;
        }

        @keyframes fly-to-deck-anim {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0.1) translateY(500px) rotate(360deg); opacity: 0; }
        }

        .shake {
            animation: shake-anim 0.3s;
        }

        @keyframes shake-anim {
            0%, 100% { transform: rotateY(180deg) translateX(0); }
            25% { transform: rotateY(180deg) translateX(-10px); }
            75% { transform: rotateY(180deg) translateX(10px); }
        }

        /* 按鈕與選單 */
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            z-index: 10;
        }

        .btn {
            padding: 10px 25px;
            border-radius: 30px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            font-size: 1.1rem;
            text-transform: uppercase;
        }

        .btn-primary {
            background: var(--electric-orange);
            color: white;
            box-shadow: var(--orange-glow);
        }

        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: var(--electric-blue);
            border: 1px solid var(--electric-blue);
        }

        .btn:hover {
            transform: scale(1.05);
            filter: brightness(1.2);
        }

        /* 結束彈窗 */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: #1a1a3a;
            padding: 40px;
            border-radius: 20px;
            border: 3px solid var(--electric-blue);
            text-align: center;
            max-width: 90%;
        }

        /* 手機適配 */
        @media (max-width: 600px) {
            .card-container {
                width: 180px;
                height: 260px;
            }
            .formula { font-size: 2.5rem; }
            .answer-input { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <!-- 背景星塵 -->
    <style>
        /* 螢幕數字鍵盤樣式（共用） */
        .onscreen-keypad {
            position: static; /* 直接跟著題目顯示在下方 */
            width: 100%;
            max-width: 560px;
            margin: 10px auto 0;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid var(--electric-blue);
            border-radius: 16px;
            padding: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), var(--neon-glow);
            backdrop-filter: blur(6px);
            display: none;
            user-select: none;
        }
        .onscreen-keypad .key-row { display: flex; gap: 10px; margin: 6px 0; }
        .onscreen-keypad .key {
            flex: 1; background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.3);
            border-radius: 12px; padding: 12px 0; font-size: 1.4rem; cursor: pointer; box-shadow: inset 0 0 10px rgba(0,0,0,0.4);
        }
        .onscreen-keypad .key:active { transform: scale(0.98); }
        .onscreen-keypad .key.action { background: rgba(0, 242, 255, 0.15); border-color: var(--electric-blue); }
        /* 鍵盤內嵌於題目下方，無需額外底部內距 */
        body.keypad-visible { padding-bottom: 0; }
    </style>
    <!-- 背景星塵 -->
    <div id="star-container"></div>

    <div class="header">
        <h1>🌌 九九乘法：對戰卡牌大搜集 🌌</h1>
        <div class="stats-bar">
            <div class="stat-item">已收集: <span id="collected-count">0</span> / 36</div>
            <div class="stat-item">連擊: <span id="combo-count">0</span></div>
            <div class="stat-item">時間: <span id="timer">0.0</span>s</div>
        </div>
    </div>

    <div class="game-world">
        <div id="card" class="card-container">
            <!-- 背面 -->
            <div class="card-face card-back">
                <div class="comet-art">
                    <div class="comet-body">
                        <div class="comet-face">
                            <div class="comet-eye eye-left"></div>
                            <div class="comet-eye eye-right"></div>
                            <div class="comet-mouth"></div>
                        </div>
                    </div>
                    <div class="floating-numbers">
                        <div class="fn fn-2">2</div>
                        <div class="fn fn-3">3</div>
                        <div class="fn fn-5">5</div>
                        <div class="fn fn-8">8</div>
                    </div>
                </div>
                <div style="margin-top: 20px; font-weight: bold; letter-spacing: 2px;">POKER BATTLE</div>
            </div>
            <!-- 正面 -->
            <div class="card-face card-front">
                <div id="formula-text" class="formula">? × ?</div>
                <input type="number" id="answer-input" class="answer-input" placeholder="?" inputmode="none" autocomplete="off">
                <div style="color: #666; font-size: 0.8rem;">輸入答案以贏得卡牌</div>
            </div>
        </div>

        <!-- 收集欄位 -->
        <div id="deck" class="collection-deck">
            <!-- 已收集卡牌會顯示在此 -->
        </div>
    </div>

    <!-- 螢幕數字鍵盤：在行動裝置上使用，避免原生鍵盤遮擋題目 -->
    <div id="onscreen-keypad" class="onscreen-keypad" aria-label="數字鍵盤" role="group">
        <div class="key-row">
            <button type="button" class="key">1</button>
            <button type="button" class="key">2</button>
            <button type="button" class="key">3</button>
        </div>
        <div class="key-row">
            <button type="button" class="key">4</button>
            <button type="button" class="key">5</button>
            <button type="button" class="key">6</button>
        </div>
        <div class="key-row">
            <button type="button" class="key">7</button>
            <button type="button" class="key">8</button>
            <button type="button" class="key">9</button>
        </div>
        <div class="key-row">
            <button type="button" class="key action" data-action="del">⌫</button>
            <button type="button" class="key">0</button>
            <button type="button" class="key action" data-action="enter">✓</button>
        </div>
    </div>

    <div class="controls">
        <button id="home-btn" class="btn btn-secondary" onclick="location.href='index.html'">🏠 返回地圖</button>
        <button id="start-btn" class="btn btn-primary">開始挑戰</button>
    </div>

    <!-- 結束畫面 -->
    <div id="end-modal" class="modal">
        <div class="modal-content">
            <h2 style="color: var(--electric-orange); font-size: 2rem;">🏆 挑戰完成！</h2>
            <p style="font-size: 1.2rem;">你成功贏得了所有 <span id="final-cards">0</span> 張卡牌！</p>
            <p>總耗時：<span id="final-time">0.0</span> 秒</p>
            <p>最高連擊：<span id="max-combo">0</span></p>
            <div style="margin-top: 20px;">
                <button class="btn btn-primary" onclick="location.reload()">再玩一次</button>
                <button class="btn btn-secondary" onclick="location.href='index.html'">返回地圖</button>
            </div>
        </div>
    </div>

    <script>
        const card = document.getElementById('card');
        const startBtn = document.getElementById('start-btn');
        const formulaText = document.getElementById('formula-text');
        const answerInput = document.getElementById('answer-input');
        const collectedCountEl = document.getElementById('collected-count');
        const comboCountEl = document.getElementById('combo-count');
        const timerEl = document.getElementById('timer');
        const deckEl = document.getElementById('deck');
        const endModal = document.getElementById('end-modal');

        let isGameActive = false;
        let collectedCount = 0;
        let combo = 0;
        let maxCombo = 0;
        let startTime = 0;
        let timerInterval;
        let currentAnswer = 0;
        let targetCount = 36; // 總卡牌數

        // 建立星塵背景
        function createStars() {
            const container = document.getElementById('star-container');
            for(let i=0; i<50; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 3 + 1;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = Math.random() * 100 + 'vw';
                star.style.top = -Math.random() * 100 + 'vh';
                star.style.animationDuration = (Math.random() * 3 + 2) + 's';
                star.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(star);
            }
        }
        createStars();

        function nextQuestion() {
            if (collectedCount >= targetCount) {
                endGame();
                return;
            }

            // 產生 2-9 的乘法 (排除太簡單的 1)
            const a = Math.floor(Math.random() * 8) + 2;
            const b = Math.floor(Math.random() * 8) + 2;
            currentAnswer = a * b;
            formulaText.textContent = `${a} × ${b}`;
            answerInput.value = '';
            answerInput.focus();
        }

        function startGame() {
            isGameActive = true;
            collectedCount = 0;
            combo = 0;
            maxCombo = 0;
            collectedCountEl.textContent = '0';
            comboCountEl.textContent = '0';
            deckEl.innerHTML = '';
            startBtn.style.display = 'none';
            
            card.classList.add('flipped');
            startTime = Date.now();
            timerInterval = setInterval(() => {
                const diff = (Date.now() - startTime) / 1000;
                timerEl.textContent = diff.toFixed(1);
            }, 100);

            setTimeout(nextQuestion, 600);
        }

        function handleCorrect() {
            collectedCount++;
            combo++;
            if (combo > maxCombo) maxCombo = combo;
            
            collectedCountEl.textContent = collectedCount;
            comboCountEl.textContent = combo;

            // 視覺效果：卡牌飛入牌堆
            const flyCard = card.cloneNode(true);
            flyCard.classList.add('fly-to-deck');
            flyCard.classList.remove('flipped');
            document.body.appendChild(flyCard);
            
            const rect = card.getBoundingClientRect();
            flyCard.style.position = 'fixed';
            flyCard.style.top = rect.top + 'px';
            flyCard.style.left = rect.left + 'px';
            flyCard.style.zIndex = 100;
            
            setTimeout(() => flyCard.remove(), 600);

            // 在底部牌堆新增一張小卡
            const smallCard = document.createElement('div');
            smallCard.className = 'collected-card';
            smallCard.style.transform = `rotate(${(Math.random()-0.5)*30}deg)`;
            deckEl.appendChild(smallCard);

            // 答對震動一下正面 (縮放)
            card.animate([
                { transform: 'rotateY(180deg) scale(1)' },
                { transform: 'rotateY(180deg) scale(1.1)' },
                { transform: 'rotateY(180deg) scale(1)' }
            ], { duration: 200 });

            nextQuestion();
        }

        function handleWrong() {
            combo = 0;
            comboCountEl.textContent = '0';
            card.classList.add('shake');
            setTimeout(() => card.classList.remove('shake'), 300);
            answerInput.value = '';
        }

        function endGame() {
            isGameActive = false;
            clearInterval(timerInterval);
            document.getElementById('final-cards').textContent = collectedCount;
            document.getElementById('final-time').textContent = timerEl.textContent;
            document.getElementById('max-combo').textContent = maxCombo;
            endModal.style.display = 'flex';
        }

        answerInput.addEventListener('input', (e) => {
            if (!isGameActive) return;
            const val = parseInt(e.target.value);
            if (val === currentAnswer) {
                handleCorrect();
            } else if (e.target.value.length >= currentAnswer.toString().length) {
                // 如果位數對了但答案錯，重設 (可選)
                if (e.target.value.length > currentAnswer.toString().length) {
                    handleWrong();
                }
            }
        });

        startBtn.addEventListener('click', startGame);

        // 如果點擊卡片背面也可以開始
        card.addEventListener('click', () => {
            if (!isGameActive) startGame();
        });

        // 支援 Enter 鍵
        answerInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && parseInt(answerInput.value) !== currentAnswer) {
                handleWrong();
            }
        });

        // ===== 螢幕數字鍵盤邏輯 =====
        (function(){
            const keypad = document.getElementById('onscreen-keypad');
            const isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0) || (window.matchMedia && window.matchMedia('(pointer: coarse)').matches);
            // 僅在觸控裝置上關閉原生鍵盤，但先不要顯示鍵盤，等開始遊戲再顯示
            if (isTouch) {
                answerInput.setAttribute('readonly', 'readonly');
                answerInput.setAttribute('inputmode', 'none');
            }

            function showKeypad(show){
                if (!keypad) return;
                keypad.style.display = show ? 'block' : 'none';
                document.body.classList.toggle('keypad-visible', !!show);
            }

            function appendDigit(d) {
                if (!isGameActive) return;
                if (answerInput.value.length >= 3) return; // 乘法答案通常不超過 3 位數
                answerInput.value = answerInput.value + d;
                answerInput.dispatchEvent(new Event('input', { bubbles: true }));
            }
            function delDigit() {
                if (!isGameActive) return;
                answerInput.value = answerInput.value.slice(0, -1);
            }
            function pressEnter() {
                if (!isGameActive) return;
                const val = parseInt(answerInput.value);
                if (!isNaN(val)) {
                    if (val === currentAnswer) {
                        handleCorrect();
                    } else {
                        handleWrong();
                    }
                }
            }

            if (keypad) {
                keypad.addEventListener('click', (e) => {
                    const btn = e.target.closest('.key');
                    if (!btn) return;
                    const action = btn.dataset.action;
                    if (action === 'del') return delDigit();
                    if (action === 'enter') return pressEnter();
                    const digit = btn.textContent.trim();
                    if (/^\d$/.test(digit)) appendDigit(digit);
                });
            }

            // 攔截開始與結束，控制鍵盤顯示
            const _startGame = startGame;
            startGame = function(){
                _startGame();
                // 開始遊戲後一律顯示螢幕鍵盤，避免某些手機偵測不到觸控而不顯示
                showKeypad(true);
            };
            const _endGame = endGame;
            endGame = function(){
                _endGame();
                showKeypad(false);
            };

            // 直接在開始按鈕與卡片點擊時也顯示鍵盤，避免事件綁定時機導致的覆寫失效
            if (typeof startBtn !== 'undefined' && startBtn) {
                startBtn.addEventListener('click', function(){ showKeypad(true); });
            }
            if (typeof card !== 'undefined' && card) {
                card.addEventListener('click', function(){ if (!isGameActive) showKeypad(true); });
            }
        })();
    </script>
</body>
</html>

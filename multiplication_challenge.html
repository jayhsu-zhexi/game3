<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>九九乘法「秒答」大挑戰</title>
    <style>
        :root {
            --space-bg: #0a0a1a;
            --electric-blue: #00f2ff;
            --electric-orange: #ff8c00;
            --neon-glow: 0 0 10px rgba(0, 242, 255, 0.7), 0 0 20px rgba(0, 242, 255, 0.5);
            --orange-glow: 0 0 10px rgba(255, 140, 0, 0.7), 0 0 20px rgba(255, 140, 0, 0.5);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--space-bg);
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px),
                radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 40px);
            background-size: 550px 550px, 350px 350px, 250px 250px;
            background-position: 0 0, 40px 60px, 130px 270px;
            font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 螢幕數字鍵盤樣式 */
        .onscreen-keypad {
            position: static; /* 直接跟著題目顯示在下方 */
            width: 100%;
            max-width: 420px;
            margin: 10px auto 0;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid var(--electric-blue);
            border-radius: 16px;
            padding: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), var(--neon-glow);
            backdrop-filter: blur(6px);
            display: none; /* 觸控裝置開始遊戲後顯示 */
            user-select: none;
        }
        .onscreen-keypad .key-row {
            display: flex;
            gap: 10px;
            margin: 6px 0;
        }
        .onscreen-keypad .key {
            flex: 1;
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 12px;
            padding: 12px 0;
            font-size: 1.4rem;
            cursor: pointer;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.4);
        }
        .onscreen-keypad .key:active { transform: scale(0.98); }
        .onscreen-keypad .key.action {
            background: rgba(0, 242, 255, 0.15);
            border-color: var(--electric-blue);
        }
        /* 鍵盤內嵌於題目下方，無需額外底部內距 */
        body.keypad-visible { padding-bottom: 0; }

        /* 卡牌背面設計 */
        .card-back {
            width: 200px;
            height: 300px;
            background: #111;
            border: 4px solid var(--electric-blue);
            border-radius: 15px;
            position: relative;
            overflow: hidden;
            box-shadow: var(--neon-glow);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .comet-container {
            position: relative;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1a1a3a 0%, #000 70%);
        }

        /* 火彗星 */
        .comet {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            background: linear-gradient(45deg, var(--electric-orange), #ff4500);
            border-radius: 50% 50% 50% 0;
            rotate: -45deg;
            border: 3px solid white;
            box-shadow: var(--orange-glow);
            z-index: 2;
        }

        .comet::after {
            content: "🔥";
            font-size: 40px;
            position: absolute;
            top: 20px;
            left: 20px;
            rotate: 45deg;
        }

        .comet-eyes {
            position: absolute;
            top: 25px;
            left: 15px;
            width: 50px;
            height: 20px;
            display: flex;
            justify-content: space-around;
            rotate: 45deg;
        }

        .eye {
            width: 12px;
            height: 12px;
            background: black;
            border-radius: 50%;
            position: relative;
        }

        .eye::after {
            content: "";
            position: absolute;
            top: 2px;
            left: 2px;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
        }

        /* 閃爍數字 */
        .floating-number {
            position: absolute;
            font-size: 24px;
            font-weight: bold;
            color: var(--electric-blue);
            text-shadow: 0 0 5px white;
            animation: blink 1.5s infinite alternate;
        }

        @keyframes blink {
            from { opacity: 0.3; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1.2); }
        }

        .n2 { top: 20%; left: 20%; animation-delay: 0.2s; }
        .n3 { top: 20%; right: 20%; animation-delay: 0.5s; }
        .n5 { bottom: 20%; left: 20%; animation-delay: 0.8s; }
        .n8 { bottom: 20%; right: 20%; animation-delay: 1.1s; }

        /* 遊戲介面 */
        .game-header {
            text-align: center;
            margin-top: 20px;
            z-index: 10;
        }

        h1 {
            font-size: 2.5rem;
            color: var(--electric-blue);
            text-shadow: 0 0 10px var(--electric-blue);
            margin-bottom: 5px;
        }

        .stats {
            display: flex;
            gap: 20px;
            font-size: 1.2rem;
            margin-bottom: 20px;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 10px;
            border: 1px solid var(--electric-blue);
        }

        .card-stage {
            perspective: 1000px;
            margin: 20px;
        }

        .card {
            width: 250px;
            height: 380px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 8px solid white;
        }

        .card-front {
            background: white;
            color: #333;
            transform: rotateY(180deg);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.5);
        }

        .question {
            font-size: 4rem;
            font-weight: 900;
            color: #1a1a3a;
        }

        .input-area {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        input {
            background: rgba(255, 255, 255, 0.9);
            border: 4px solid var(--electric-blue);
            padding: 15px;
            font-size: 2rem;
            width: 150px;
            text-align: center;
            border-radius: 15px;
            outline: none;
            box-shadow: var(--neon-glow);
            color: #000;
        }

        .btn-start {
            background: var(--electric-orange);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: var(--orange-glow);
            transition: transform 0.2s;
            margin-top: 20px;
        }

        .btn-start:hover {
            transform: scale(1.1);
        }

        .btn-home {
            background: rgba(255, 255, 255, 0.1);
            color: var(--electric-blue);
            border: 1px solid var(--electric-blue);
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        .btn-home:hover {
            background: var(--electric-blue);
            color: var(--space-bg);
        }

        .combo-text {
            position: absolute;
            font-size: 3rem;
            color: #ff0;
            font-weight: bold;
            pointer-events: none;
            opacity: 0;
            z-index: 100;
            text-shadow: 0 0 10px #f00;
        }

        @keyframes comboPop {
            0% { transform: scale(0.5); opacity: 1; }
            100% { transform: scale(2) translateY(-100px); opacity: 0; }
        }

        .timer-bar-container {
            width: 300px;
            height: 15px;
            background: #333;
            border-radius: 10px;
            margin: 10px 0;
            overflow: hidden;
            border: 2px solid var(--electric-blue);
        }

        .timer-bar {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, var(--electric-blue), #00ff00);
            transition: width 0.1s linear;
        }

        .feedback {
            font-size: 1.5rem;
            height: 2rem;
            margin-top: 10px;
            font-weight: bold;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: #1a1a3a;
            padding: 40px;
            border-radius: 20px;
            border: 4px solid var(--electric-blue);
            text-align: center;
            max-width: 400px;
        }

        /* 背景裝飾：像素星塵 */
        .pixel-dust {
            position: fixed;
            width: 4px;
            height: 4px;
            background: white;
            pointer-events: none;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="game-header">
        <div style="margin-bottom: 10px;">
            <button class="btn-home" onclick="location.href='index.html'">🏠 返回地圖</button>
        </div>
        <h1>九九乘法「秒答」挑戰</h1>
        <div class="stats">
            <div class="stat-box">分數: <span id="score">0</span></div>
            <div class="stat-box">連擊: <span id="combo">0</span></div>
            <div class="stat-box">最高: <span id="high-score">0</span></div>
        </div>
        <div class="timer-bar-container">
            <div id="timer-bar" class="timer-bar"></div>
        </div>
    </div>

    <div class="card-stage">
        <div id="game-card" class="card">
            <!-- 背面 (設計主題) -->
            <div class="card-face card-back">
                <div class="comet-container">
                    <div class="comet">
                        <div class="comet-eyes">
                            <div class="eye"></div>
                            <div class="eye"></div>
                        </div>
                    </div>
                    <div class="floating-number n2">2</div>
                    <div class="floating-number n3">3</div>
                    <div class="floating-number n5">5</div>
                    <div class="floating-number n8">8</div>
                </div>
            </div>
            <!-- 正面 (算式) -->
            <div class="card-face card-front">
                <div id="question" class="question">? × ?</div>
                <div class="input-area">
                    <input type="number" id="answer-input" placeholder="?" autocomplete="off" inputmode="none">
                    <div id="feedback" class="feedback"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 螢幕數字鍵盤：在行動裝置上使用，避免原生鍵盤遮擋題目 -->
    <div id="onscreen-keypad" class="onscreen-keypad" aria-label="數字鍵盤" role="group">
        <div class="key-row">
            <button type="button" class="key">1</button>
            <button type="button" class="key">2</button>
            <button type="button" class="key">3</button>
        </div>
        <div class="key-row">
            <button type="button" class="key">4</button>
            <button type="button" class="key">5</button>
            <button type="button" class="key">6</button>
        </div>
        <div class="key-row">
            <button type="button" class="key">7</button>
            <button type="button" class="key">8</button>
            <button type="button" class="key">9</button>
        </div>
        <div class="key-row">
            <button type="button" class="key action" data-action="del">⌫</button>
            <button type="button" class="key">0</button>
            <button type="button" class="key action" data-action="enter">✓</button>
        </div>
    </div>

    <button id="start-btn" class="btn-start">開始挑戰！</button>

    <div id="result-modal" class="modal">
        <div class="modal-content">
            <h2>遊戲結束！</h2>
            <p style="font-size: 1.5rem">你的得分：<span id="final-score">0</span></p>
            <p>最高連擊：<span id="max-combo">0</span></p>
            <button class="btn-start" onclick="location.reload()">再試一次</button>
        </div>
    </div>

    <script>
        const card = document.getElementById('game-card');
        const startBtn = document.getElementById('start-btn');
        const questionEl = document.getElementById('question');
        const inputEl = document.getElementById('answer-input');
        const scoreEl = document.getElementById('score');
        const comboEl = document.getElementById('combo');
        const highScoreEl = document.getElementById('high-score');
        const timerBar = document.getElementById('timer-bar');
        const feedbackEl = document.getElementById('feedback');
        const modal = document.getElementById('result-modal');

        let score = 0;
        let combo = 0;
        let maxCombo = 0;
        let highScore = localStorage.getItem('multi-high-score') || 0;
        let currentAnswer = 0;
        let timeLeft = 100;
        let gameActive = false;
        let timerInterval;
        let timeLimit = 5000; // 每題 5 秒
        let startTime;

        highScoreEl.textContent = highScore;

        // 建立背景像素星塵
        function createDust() {
            for(let i=0; i<50; i++) {
                const dust = document.createElement('div');
                dust.className = 'pixel-dust';
                dust.style.left = Math.random() * 100 + 'vw';
                dust.style.top = Math.random() * 100 + 'vh';
                dust.style.opacity = Math.random();
                document.body.appendChild(dust);
            }
        }
        createDust();

        function nextQuestion() {
            const a = Math.floor(Math.random() * 8) + 2;
            const b = Math.floor(Math.random() * 8) + 2;
            currentAnswer = a * b;
            questionEl.textContent = `${a} × ${b}`;
            inputEl.value = '';
            inputEl.focus();
            
            // 重設計時器
            resetTimer();
        }

        function resetTimer() {
            clearInterval(timerInterval);
            timeLeft = 100;
            timerBar.style.width = '100%';
            timerBar.style.background = 'linear-gradient(90deg, var(--electric-blue), #00ff00)';
            
            const step = 2; // 每 100ms 扣除的百分比
            startTime = Date.now();
            
            timerInterval = setInterval(() => {
                const elapsed = Date.now() - startTime;
                timeLeft = 100 - (elapsed / timeLimit * 100);
                
                if (timeLeft <= 0) {
                    timeLeft = 0;
                    handleWrong();
                }
                
                timerBar.style.width = timeLeft + '%';
                if (timeLeft < 30) {
                    timerBar.style.background = '#ff0000';
                }
            }, 50);
        }

        function handleRight() {
            score += 10 + (combo * 2);
            combo++;
            if (combo > maxCombo) maxCombo = combo;
            
            scoreEl.textContent = score;
            comboEl.textContent = combo;
            
            showComboEffect();
            feedbackEl.textContent = "超快！⚡";
            feedbackEl.style.color = "#00ff00";
            
            // 答對效果：卡牌微跳動
            card.style.transform = 'rotateY(180deg) scale(1.05)';
            setTimeout(() => {
                card.style.transform = 'rotateY(180deg) scale(1)';
            }, 200);

            nextQuestion();
        }

        function handleWrong() {
            combo = 0;
            comboEl.textContent = combo;
            feedbackEl.textContent = "再接再厲！💥";
            feedbackEl.style.color = "#ff4500";
            
            // 答錯效果：震動
            card.animate([
                { transform: 'rotateY(180deg) translateX(-10px)' },
                { transform: 'rotateY(180deg) translateX(10px)' },
                { transform: 'rotateY(180deg) translateX(0)' }
            ], { duration: 100, iterations: 3 });

            if (timeLeft <= 0) {
                endGame();
            } else {
                nextQuestion();
            }
        }

        function showComboEffect() {
            if (combo < 2) return;
            const comboTxt = document.createElement('div');
            comboTxt.className = 'combo-text';
            comboTxt.textContent = combo + ' COMBO!';
            comboTxt.style.left = (Math.random() * 60 + 20) + '%';
            comboTxt.style.top = (Math.random() * 40 + 30) + '%';
            comboTxt.style.animation = 'comboPop 0.8s forwards';
            document.body.appendChild(comboTxt);
            setTimeout(() => comboTxt.remove(), 800);
        }

        function startGame() {
            gameActive = true;
            score = 0;
            combo = 0;
            scoreEl.textContent = '0';
            comboEl.textContent = '0';
            startBtn.style.display = 'none';
            card.classList.add('flipped');
            
            setTimeout(() => {
                nextQuestion();
            }, 600);
        }

        function endGame() {
            gameActive = false;
            clearInterval(timerInterval);
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('multi-high-score', highScore);
            }
            
            document.getElementById('final-score').textContent = score;
            document.getElementById('max-combo').textContent = maxCombo;
            modal.style.display = 'flex';
        }

        inputEl.addEventListener('input', (e) => {
            if (!gameActive) return;
            const val = parseInt(e.target.value);
            if (val === currentAnswer) {
                handleRight();
            } else if (e.target.value.length >= currentAnswer.toString().length) {
                // 如果輸入長度已經夠了但不對，就不必等了（或是可以給一點緩衝）
                // 這裡選擇不立即判定錯，讓玩家可以修改，直到時間到或長度超過
                if (e.target.value.length > currentAnswer.toString().length) {
                    handleWrong();
                }
            }
        });

        startBtn.addEventListener('click', startGame);

        // 點擊卡牌背面也可以開始
        card.addEventListener('click', () => {
            if (!gameActive) startGame();
        });

        // ===== 螢幕數字鍵盤邏輯 =====
        (function(){
            const keypad = document.getElementById('onscreen-keypad');
            const isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0) || (window.matchMedia && window.matchMedia('(pointer: coarse)').matches);
            // 僅在觸控裝置上關閉原生鍵盤，但先不要顯示鍵盤，等開始遊戲再顯示
            if (isTouch) {
                inputEl.setAttribute('readonly', 'readonly');
                inputEl.setAttribute('inputmode', 'none');
            }

            function showKeypad(show){
                if (!keypad) return;
                keypad.style.display = show ? 'block' : 'none';
                document.body.classList.toggle('keypad-visible', !!show);
            }

            function appendDigit(d) {
                if (!gameActive) return;
                if (inputEl.value.length >= 3) return; // 乘法答案通常不超過 3 位數
                inputEl.value = inputEl.value + d;
                // 觸發既有的 input 判斷
                inputEl.dispatchEvent(new Event('input', { bubbles: true }));
            }
            function delDigit() {
                if (!gameActive) return;
                inputEl.value = inputEl.value.slice(0, -1);
            }
            function pressEnter() {
                if (!gameActive) return;
                const val = parseInt(inputEl.value);
                if (!isNaN(val)) {
                    if (val === currentAnswer) {
                        handleRight();
                    } else {
                        handleWrong();
                    }
                }
            }

            if (keypad) {
                keypad.addEventListener('click', (e) => {
                    const btn = e.target.closest('.key');
                    if (!btn) return;
                    const action = btn.dataset.action;
                    if (action === 'del') return delDigit();
                    if (action === 'enter') return pressEnter();
                    const digit = btn.textContent.trim();
                    if (/^\d$/.test(digit)) appendDigit(digit);
                });
            }

            // 攔截開始與結束，控制鍵盤顯示
            const _startGame = startGame;
            startGame = function(){
                _startGame();
                // 開始遊戲後一律顯示螢幕鍵盤，避免某些手機偵測不到觸控而不顯示
                showKeypad(true);
            };
            const _endGame = endGame;
            endGame = function(){
                _endGame();
                showKeypad(false);
            };

            // 直接在開始按鈕與卡片點擊時也顯示鍵盤，避免事件綁定時機導致的覆寫失效
            if (typeof startBtn !== 'undefined' && startBtn) {
                startBtn.addEventListener('click', function(){ showKeypad(true); });
            }
            if (typeof card !== 'undefined' && card) {
                card.addEventListener('click', function(){ if (!gameActive) showKeypad(true); });
            }
        })();
    </script>
    <style>
        /* 手機版一頁完整顯示調整 */
        @media (max-width: 600px) {
            body { min-height: 100dvh; }
            .game-header { margin-top: 8px; }
            h1 { font-size: clamp(1.2rem, 5.5vw, 1.6rem); margin-bottom: 4px; }
            .stats { gap: 8px; font-size: 0.95rem; margin-bottom: 8px; }
            .stat-box { padding: 6px 10px; }
            .timer-bar-container { height: 8px; margin: 6px auto; }

            .card-stage { margin: 8px 0; }
            .card { width: 200px; height: 300px; }
            .question { font-size: 2.4rem; }
            .input-area { margin-top: 10px; }
            #answer-input { width: 120px; padding: 10px; font-size: 1.4rem; border-width: 3px; }

            .onscreen-keypad { max-width: 340px; padding: 8px; }
            .onscreen-keypad .key-row { gap: 8px; margin: 4px 0; }
            .onscreen-keypad .key { padding: 10px 0; font-size: 1.15rem; }

            .btn-start { font-size: 1.2rem; padding: 10px 24px; margin-top: 10px; }
        }
    </style>
</body>
</html>

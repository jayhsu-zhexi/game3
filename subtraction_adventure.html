<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三位數連環退位減法大冒險</title>
    <style>
        :root {
            --jungle-green: #2d5a27;
            --path-stone: #a0a0a0;
            --flower-glow: #ff00ff;
            --accent-gold: #ffd700;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Microsoft JhengHei', sans-serif;
            background-color: #1a3306;
            color: white;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            height: 100%;
            background: linear-gradient(#1e3d09, #2d5a27);
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 15px;
            text-align: center;
            background: rgba(0,0,0,0.3);
            border-bottom: 3px solid var(--accent-gold);
            z-index: 10;
        }

        #maze-view {
            flex-grow: 1;
            position: relative;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(255,255,255,0.05) 0%, transparent 50%),
                url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><rect width="100" height="100" fill="%231a3306"/><path d="M0 50 Q 25 25 50 50 T 100 50" stroke="%232d5a27" stroke-width="2" fill="none" opacity="0.3"/></svg>');
        }

        .maze-path {
            position: absolute;
            background: #5d5d5d;
            box-shadow: inset 0 0 10px #000;
            border-radius: 10px;
        }

        .ruin-point {
            position: absolute;
            width: 60px;
            height: 60px;
            background: #8e8e8e;
            border: 4px solid #444;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.3s, filter 0.3s;
            z-index: 5;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .ruin-point::before {
            content: '🏛️';
            font-size: 30px;
        }

        .ruin-point.completed {
            background: #4caf50;
            filter: grayscale(0.5);
            cursor: default;
        }

        .ruin-point.active {
            filter: drop-shadow(0 0 10px var(--flower-glow));
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        #player {
            position: absolute;
            width: 40px;
            height: 40px;
            background: #f0ad4e;
            border-radius: 50%;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 25px;
            transition: all 0.5s ease;
            box-shadow: 0 0 20px var(--accent-gold);
        }

        .flag-start {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 40px;
            z-index: 6;
        }

        .treasure-chest {
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-size: 60px;
            z-index: 6;
            filter: drop-shadow(0 0 10px gold);
        }

        /* Puzzle Modal */
        #puzzle-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
        }

        .puzzle-card {
            background: #fff;
            color: #333;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 400px;
            width: 90%;
            text-align: center;
        }

        .subtraction-vertical {
            font-family: 'Courier New', Courier, monospace;
            font-size: 48px;
            font-weight: bold;
            display: inline-block;
            text-align: right;
            margin-bottom: 20px;
            line-height: 1.2;
        }

        .subtraction-line {
            border-bottom: 4px solid #333;
            margin-bottom: 10px;
        }

        .ans-input {
            width: 100%;
            font-size: 40px;
            text-align: center;
            padding: 10px;
            border: 3px solid #ddd;
            border-radius: 10px;
            margin-bottom: 20px;
            outline: none;
        }

        .ans-input:focus {
            border-color: #2ecc71;
        }

        .submit-btn {
            background: #27ae60;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 20px;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }

        .submit-btn:hover {
            background: #219150;
        }

        /* Decorative Jungle Elements */
        .jungle-leaf {
            position: absolute;
            font-size: 50px;
            pointer-events: none;
            opacity: 0.6;
        }

        .monkey {
            position: absolute;
            font-size: 40px;
            z-index: 8;
            transition: transform 1s;
        }

        .flower {
            position: absolute;
            font-size: 30px;
            filter: drop-shadow(0 0 5px var(--flower-glow));
        }

        /* Success/Failure Feedback */
        #feedback {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 100px;
            z-index: 200;
            display: none;
            pointer-events: none;
        }

        .home-btn {
            background: #e67e22;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            font-size: 14px;
        }

    </style>
</head>
<body>

<div id="game-container">
    <header>
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <a href="index.html" class="home-btn">🏠 返回地圖</a>
            <h2>🌿 減法叢林大冒險 🌿</h2>
            <div id="star-count">⭐ 0/5</div>
        </div>
        <p style="font-size: 14px; margin-top: 5px; color: #ccc;">解開石墟謎題，尋找隱藏寶藏！</p>
    </header>

    <div id="maze-view">
        <!-- Start & End -->
        <div class="flag-start">🚩</div>
        <div class="treasure-chest">🎁</div>

        <!-- Player -->
        <div id="player">🤠</div>

        <!-- Ruin Points will be added by JS -->
    </div>

    <!-- Puzzle Modal -->
    <div id="puzzle-overlay">
        <div class="puzzle-card">
            <h3 style="margin-bottom: 20px;">🗿 古代石墟的謎題</h3>
            <div class="subtraction-vertical">
                <div id="num1">504</div>
                <div>- <span id="num2">267</span></div>
                <div class="subtraction-line"></div>
            </div>
            <input type="number" id="ans-input" class="ans-input" placeholder="答案" inputmode="numeric">
            <button class="submit-btn" onclick="checkAnswer()">提交答案</button>
            <p id="hint" style="margin-top: 15px; color: #e74c3c; font-weight: bold; display: none;">再試一次！記得連環退位喔！</p>
        </div>
    </div>

    <div id="feedback">✨</div>
</div>

<script>
    const AudioSystem = {
        context: null,
        init() {
            if (!this.context) {
                this.context = new (window.AudioContext || window.webkitAudioContext)();
            }
        },
        playCorrect() {
            this.init();
            const osc = this.context.createOscillator();
            const gain = this.context.createGain();
            osc.connect(gain);
            gain.connect(this.context.destination);
            osc.frequency.setValueAtTime(523.25, this.context.currentTime);
            osc.frequency.setValueAtTime(659.25, this.context.currentTime + 0.1);
            gain.gain.setValueAtTime(0.2, this.context.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, this.context.currentTime + 0.3);
            osc.start();
            osc.stop(this.context.currentTime + 0.3);
        },
        playWrong() {
            this.init();
            const osc = this.context.createOscillator();
            const gain = this.context.createGain();
            osc.connect(gain);
            gain.connect(this.context.destination);
            osc.frequency.setValueAtTime(200, this.context.currentTime);
            osc.type = 'sawtooth';
            gain.gain.setValueAtTime(0.2, this.context.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, this.context.currentTime + 0.2);
            osc.start();
            osc.stop(this.context.currentTime + 0.2);
        },
        playWin() {
            this.init();
            const notes = [523.25, 659.25, 783.99, 1046.50];
            notes.forEach((freq, i) => {
                const osc = this.context.createOscillator();
                const gain = this.context.createGain();
                osc.connect(gain);
                gain.connect(this.context.destination);
                osc.frequency.setValueAtTime(freq, this.context.currentTime + i * 0.15);
                gain.gain.setValueAtTime(0.2, this.context.currentTime + i * 0.15);
                gain.gain.exponentialRampToValueAtTime(0.01, this.context.currentTime + i * 0.15 + 0.5);
                osc.start(this.context.currentTime + i * 0.15);
                osc.stop(this.context.currentTime + i * 0.15 + 0.5);
            });
        }
    };

    const GameState = {
        currentRuin: 0,
        totalRuins: 5,
        solvedCount: 0,
        points: [
            { x: 100, y: 120 },
            { x: 250, y: 250 },
            { x: 120, y: 400 },
            { x: 400, y: 350 },
            { x: 550, y: 500 }
        ],
        currentQuestion: null
    };

    function initMaze() {
        const mazeView = document.getElementById('maze-view');
        
        // Adjust points based on container size
        const rect = mazeView.getBoundingClientRect();
        GameState.points = [
            { x: rect.width * 0.2, y: rect.height * 0.25 },
            { x: rect.width * 0.5, y: rect.height * 0.2 },
            { x: rect.width * 0.3, y: rect.height * 0.5 },
            { x: rect.width * 0.7, y: rect.height * 0.45 },
            { x: rect.width * 0.6, y: rect.height * 0.75 }
        ];

        // Draw Ruins
        GameState.points.forEach((p, i) => {
            const ruin = document.createElement('div');
            ruin.className = 'ruin-point';
            ruin.id = `ruin-${i}`;
            ruin.style.left = `${p.x - 30}px`;
            ruin.style.top = `${p.y - 30}px`;
            ruin.onclick = () => tryRuin(i);
            mazeView.appendChild(ruin);
        });

        // Add some deco
        for(let i=0; i<15; i++) {
            const leaf = document.createElement('div');
            leaf.className = 'jungle-leaf';
            leaf.innerHTML = ['🍃', '🌿', '🌱', '🌴'][Math.floor(Math.random()*4)];
            leaf.style.left = Math.random() * 90 + '%';
            leaf.style.top = Math.random() * 90 + '%';
            leaf.style.transform = `rotate(${Math.random()*360}deg)`;
            mazeView.appendChild(leaf);
        }

        // Add some flowers
        for(let i=0; i<8; i++) {
            const flower = document.createElement('div');
            flower.className = 'flower';
            flower.innerHTML = '🌸';
            flower.style.left = Math.random() * 90 + '%';
            flower.style.top = Math.random() * 90 + '%';
            mazeView.appendChild(flower);
        }

        // Add monkey
        const monkey = document.createElement('div');
        monkey.className = 'monkey';
        monkey.innerHTML = '🐒';
        monkey.style.left = '80%';
        monkey.style.top = '10%';
        mazeView.appendChild(monkey);
        setInterval(() => {
            monkey.style.left = Math.random() * 80 + 10 + '%';
            monkey.style.top = Math.random() * 80 + 10 + '%';
            monkey.style.transform = `scaleX(${Math.random() > 0.5 ? 1 : -1})`;
        }, 5000);

        updateActiveRuin();
        movePlayerTo(40, 40); // Initial pos
    }

    function movePlayerTo(x, y) {
        const player = document.getElementById('player');
        player.style.left = `${x - 20}px`;
        player.style.top = `${y - 20}px`;
    }

    function updateActiveRuin() {
        for(let i=0; i<GameState.totalRuins; i++) {
            const el = document.getElementById(`ruin-${i}`);
            el.classList.remove('active');
            if (i === GameState.solvedCount) {
                el.classList.add('active');
            }
        }
        document.getElementById('star-count').textContent = `⭐ ${GameState.solvedCount}/${GameState.totalRuins}`;
    }

    function tryRuin(index) {
        if (index !== GameState.solvedCount) return;
        
        showPuzzle();
    }

    function generateSubtraction() {
        // Generate "Borrowing across zero" problems
        // Format: X0Y - ABZ where Z > Y and B > 0
        const hundreds = Math.floor(Math.random() * 7) + 2; // 2-8
        const num1 = hundreds * 100 + Math.floor(Math.random() * 9); // X0[0-8]
        
        // num2 must be smaller but require borrowing
        const sub_hundreds = Math.floor(Math.random() * (hundreds - 1)) + 1;
        const sub_tens = Math.floor(Math.random() * 8) + 1; // 1-8
        const sub_ones = Math.floor(Math.random() * 8) + (num1 % 10 + 1); // Ensure > num1 ones
        
        const num2 = sub_hundreds * 100 + sub_tens * 10 + (sub_ones % 10 + (num1 % 10 === 9 ? 0 : 1));
        
        // Final check to ensure it's a valid 3-digit subtraction with middle zero
        const n1 = hundreds * 100 + (Math.floor(Math.random()*10)); 
        const n2 = (Math.floor(Math.random()*(hundreds-1))+1)*100 + (Math.floor(Math.random()*8)+1)*10 + (n1%10 + 1 + Math.floor(Math.random()*2));
        
        if (n1 - n2 < 0) return generateSubtraction(); // Safety

        return { n1, n2, ans: n1 - n2 };
    }

    function showPuzzle() {
        const q = generateSubtraction();
        GameState.currentQuestion = q;
        document.getElementById('num1').textContent = q.n1;
        document.getElementById('num2').textContent = q.n2;
        document.getElementById('ans-input').value = '';
        document.getElementById('hint').style.display = 'none';
        document.getElementById('puzzle-overlay').style.display = 'flex';
        document.getElementById('ans-input').focus();
    }

    function checkAnswer() {
        const userAns = parseInt(document.getElementById('ans-input').value);
        if (userAns === GameState.currentQuestion.ans) {
            handleCorrect();
        } else {
            handleWrong();
        }
    }

    function handleCorrect() {
        AudioSystem.playCorrect();
        showFeedback('✨');
        document.getElementById('puzzle-overlay').style.display = 'none';
        
        const ruinEl = document.getElementById(`ruin-${GameState.solvedCount}`);
        ruinEl.classList.add('completed');
        ruinEl.classList.remove('active');
        
        const pos = GameState.points[GameState.solvedCount];
        movePlayerTo(pos.x, pos.y);
        
        GameState.solvedCount++;
        updateActiveRuin();

        if (GameState.solvedCount === GameState.totalRuins) {
            setTimeout(winGame, 1000);
        }
    }

    function handleWrong() {
        AudioSystem.playWrong();
        document.getElementById('hint').style.display = 'block';
        const input = document.getElementById('ans-input');
        input.style.borderColor = '#e74c3c';
        setTimeout(() => input.style.borderColor = '#ddd', 500);
    }

    function showFeedback(text) {
        const fb = document.getElementById('feedback');
        fb.textContent = text;
        fb.style.display = 'block';
        fb.style.opacity = '1';
        setTimeout(() => {
            fb.style.opacity = '0';
            setTimeout(() => fb.style.display = 'none', 500);
        }, 500);
    }

    function winGame() {
        AudioSystem.playWin();
        const rect = document.getElementById('maze-view').getBoundingClientRect();
        movePlayerTo(rect.width - 40, rect.height - 40);
        
        setTimeout(() => {
            const overlay = document.createElement('div');
            overlay.style.cssText = `
                position: absolute; top: 0; left: 0; width: 100%; height: 100%;
                background: rgba(0,0,0,0.9); display: flex; flex-direction: column;
                align-items: center; justify-content: center; z-index: 1000;
                color: white; text-align: center; animation: fadeIn 1s;
            `;
            overlay.innerHTML = `
                <h1 style="font-size: 50px; color: gold; margin-bottom: 20px;">💰 發現寶藏！ 💰</h1>
                <div style="font-size: 100px; margin-bottom: 20px;">👑💎🪙</div>
                <p style="font-size: 24px; margin-bottom: 30px;">恭喜冒險家！你成功解開了叢林謎題！<br>你的減法功力提升了！</p>
                <button onclick="location.href='index.html'" style="padding: 15px 40px; font-size: 20px; background: #f1c40f; border: none; border-radius: 10px; cursor: pointer; font-weight: bold;">領取獎勵並返回</button>
            `;
            document.body.appendChild(overlay);
        }, 800);
    }

    // Handle Enter key
    document.getElementById('ans-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') checkAnswer();
    });

    window.onload = initMaze;
</script>

</body>
</html>
